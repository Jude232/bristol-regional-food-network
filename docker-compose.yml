services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    build:
      context: .

    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "8000:8000"

    volumes:
      - media_data:/app/media

volumes:
  postgres_data:
  media_data:
