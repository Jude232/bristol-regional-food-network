{% extends "base.html" %}

{% block title %}
    Producer registration
{% endblock %}

{% block content %}
    <section class="form-card">
        <h1>Producer registration</h1>

        <p>
            Create an account to list and manage products from your
            local food business.
        </p>

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <button
                class="button"
                type="submit"
            >
                Create producer account
            </button>
        </form>

        <p>
            Already registered?
            <a href="{% url 'accounts:login' %}">
                Log in
            </a>
        </p>
    </section>
{% endblock %}
