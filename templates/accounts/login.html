{% extends "base.html" %}

{% block title %}
    Log in
{% endblock %}

{% block content %}
    <section class="form-card">
        <h1>Log in</h1>

        {% if form.errors %}
            <div class="message error">
                The email address or password was incorrect.
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            {% if next %}
                <input
                    type="hidden"
                    name="next"
                    value="{{ next }}"
                >
            {% endif %}

            <button
                class="button"
                type="submit"
            >
                Log in
            </button>
        </form>
    </section>
{% endblock %}
