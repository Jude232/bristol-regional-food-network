{% extends "base.html" %}

{% block title %}
    {{ page_title }}
{% endblock %}

{% block content %}
    <section class="form-card">
        <h1>{{ page_title }}</h1>

        <p>
            Provide accurate stock, seasonal and allergen information.
        </p>

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <div class="button-row left-aligned">
                <button
                    class="button"
                    type="submit"
                >
                    {{ submit_text }}
                </button>

                <a
                    class="button secondary"
                    href="{% url 'marketplace:producer_product_list' %}"
                >
                    Cancel
                </a>
            </div>
        </form>
    </section>
{% endblock %}
